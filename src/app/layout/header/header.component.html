<header class="header">
  <div class="container header-inner">
    <a routerLink="/" class="logo" (click)="closeMenu()">
      <img src="/assets/glosfume-logo.png" alt="Glosfume Caucasus" class="logo-img" />
    </a>

    <nav class="nav" [class.open]="isMenuOpen">
      <a
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeMenu()"
        >{{ "nav.home" | translate }}</a
      >
      <a
        routerLink="/technologies"
        routerLinkActive="active"
        (click)="closeMenu()"
        >{{ "nav.technologies" | translate }}</a
      >
      <a
        routerLink="/services"
        routerLinkActive="active"
        (click)="closeMenu()"
        >{{ "nav.services" | translate }}</a
      >
      <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">{{
        "nav.about" | translate
      }}</a>
      <a
        routerLink="/prices"
        routerLinkActive="active"
        (click)="closeMenu()"
        >{{ "nav.prices" | translate }}</a
      >
      <a
        routerLink="/contact"
        routerLinkActive="active"
        (click)="closeMenu()"
        >{{ "nav.contact" | translate }}</a
      >
    </nav>

    <div class="header-actions">
      <div class="lang-dropdown" #langDropdown>
        <button
          type="button"
          class="lang-dropdown-trigger"
          (click)="toggleLangDropdown()"
          [attr.aria-expanded]="langDropdownOpen"
          aria-haspopup="listbox"
          [attr.aria-label]="'Language'"
        >
          <span class="lang-dropdown-label">{{ currentLangLabel() }}</span>
          <svg
            class="lang-dropdown-chevron"
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            [class.open]="langDropdownOpen"
          >
            <path d="M6 9l6 6 6-6" />
          </svg>
        </button>
        @if (langDropdownOpen) {
          <div class="lang-dropdown-panel" role="listbox">
            @for (lang of languages; track lang.code) {
              <button
                type="button"
                class="lang-dropdown-option"
                role="option"
                [attr.aria-selected]="translate.currentLang === lang.code"
                (click)="selectLang(lang.code)"
              >
                {{ lang.label }}
              </button>
            }
          </div>
        }
      </div>
      <button
        type="button"
        class="menu-toggle"
        (click)="toggleMenu()"
        [attr.aria-label]="isMenuOpen ? 'Close menu' : 'Open menu'"
        [attr.aria-expanded]="isMenuOpen"
      >
        @if (isMenuOpen) {
          <svg
            class="menu-icon menu-icon-close"
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        } @else {
          <svg
            class="menu-icon menu-icon-open"
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <line x1="4" y1="6" x2="20" y2="6" />
            <line x1="4" y1="12" x2="20" y2="12" />
            <line x1="4" y1="18" x2="20" y2="18" />
          </svg>
        }
      </button>
    </div>
  </div>
</header>
